<ion-header [translucent]="true">
  <ion-toolbar style="--background:#fff; --border-width: 0;">
    <ion-buttons slot="start">
      <ion-back-button text=""></ion-back-button>
    </ion-buttons>
    <ion-title style="font-weight: bold; font-size: 18px;">
      교환권 상세
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="slider">
    <div class="slide" id="slide-1">
      <img src={{image}}/>
    </div>
    <!-- <div class="slide" id="slide-2">
      <img src="../../assets/image/banner2.png"/>
    </div>
    <div class="slide" id="slide-3">
      <img src="../../assets/image/banner3.png"/>
    </div> -->
  </div>

  <div style="padding: 10px 20px;">
    <div style="display: flex; justify-content: space-between;">
      <span style="font-size: 16px; color: #7F818B;">
        {{company}}
      </span>
      <span style="font-size: 12px; color: #7F818B;">
        {{catagory}}
      </span>
    </div>
    <p style="font-size: 18px; font-weight: bold; margin: 4px 0;">
      {{title}}
    </p>
    <p style="font-size: 18px; font-weight: bold; margin: 4px 0; color: #F16C1E;">
      {{price}} 도토리
    </p>
  </div>
</ion-content>

<ion-footer>
  <div style="padding: 10px 20px;">
    <ion-button (click)="pay()" expand="block" style="height: 56px; font-size: 20px; font-weight: bold; border-radius: 10px; --background: linear-gradient(180deg, #FF9040 0%, #F16C1E 100%); --background-activated: #F16C1E">
      {{price}} 도토리로 구매하기
    </ion-button>
  </div>
</ion-footer>
